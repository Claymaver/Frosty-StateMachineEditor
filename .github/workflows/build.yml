name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build (Release - Alpha)
        run: dotnet build --configuration "Release - Alpha" --no-restore -p:Platform=x64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: StateMachineEditorPlugin
          path: bin/Release/Alpha/StateMachineEditorPlugin.dll
          if-no-files-found: warn

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: bin/Release/Alpha/StateMachineEditorPlugin.dll
          generate_release_notes: true
